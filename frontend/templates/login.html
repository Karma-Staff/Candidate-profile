{% extends "base.html" %}

{% block content %}
<div class="login-bg">
    <!-- Logo Header -->
    <div style="text-align: center; margin-bottom: 3rem;">
        <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Karma Staff Logo"
            style="height: 120px; width: auto; background: white; padding: 2.5rem; border-radius: 24px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);">
    </div>

    <!-- Login Card -->
    <div class="login-card">
        <form method="POST">
            <div style="margin-bottom: 1.5rem;">
                <label
                    style="display: block; color: white; font-weight: 600; margin-bottom: 0.75rem; font-size: 0.9375rem;">Email
                    or Username</label>
                <input type="text" name="username" required class="login-input"
                    placeholder="admin or email@example.com">
            </div>

            <div style="margin-bottom: 2rem;">
                <label
                    style="display: block; color: white; font-weight: 600; margin-bottom: 0.75rem; font-size: 0.9375rem;">Password</label>
                <div style="position: relative;">
                    <input type="password" name="password" id="password" class="login-input" placeholder="••••••••"
                        style="padding-right: 3rem;">
                    <button type="button" onclick="togglePassword()"
                        style="position: absolute; right: 1rem; top: 50%; transform: translateY(-50%); background: none; border: none; color: #000000; cursor: pointer; padding: 0.5rem; display: flex; align-items: center; justify-content: center; transition: color 0.2s;">
                        <i data-lucide="eye" id="toggleIcon" style="width: 20px; height: 20px;"></i>
                    </button>
                </div>
            </div>

            <script>
                function togglePassword() {
                    const passwordInput = document.getElementById('password');
                    const toggleIcon = document.getElementById('toggleIcon');

                    if (passwordInput.type === 'password') {
                        passwordInput.type = 'text';
                        toggleIcon.setAttribute('data-lucide', 'eye-off');
                    } else {
                        passwordInput.type = 'password';
                        toggleIcon.setAttribute('data-lucide', 'eye');
                    }
                    lucide.createIcons();
                }
            </script>
            <div style="display: flex; justify-content: flex-end; margin-top: 0.75rem;">
                <a href="{{ url_for('forgot_password') }}"
                    style="color: rgba(255,255,255,0.7); font-size: 0.8125rem; text-decoration: none; font-weight: 500; transition: color 0.2s;"
                    onmouseover="this.style.color='#ffffff'" onmouseout="this.style.color='rgba(255,255,255,0.7)'">
                    Forgot Password?
                </a>
            </div>

            <button type="submit" class="login-btn">
                Sign In
            </button>
        </form>

        <!-- Demo Accounts Info -->
        <div style="margin-top: 2.5rem; background: #1e293b; border-radius: 12px; padding: 1.5rem; display: none;">
            <p style="color: white; font-weight: 700; font-size: 0.9375rem; margin-bottom: 1rem;">Demo Accounts:</p>
            <ul
                style="list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 0.75rem; color: white; font-size: 0.9375rem;">
                <li style="display: flex; align-items: flex-start; gap: 0.5rem;">
                    <span>•</span>
                    <span>Admin: admin@restoration.com</span>
                </li>
                <li style="display: flex; align-items: flex-start; gap: 0.5rem;">
                    <span>•</span>
                    <span>CS Team: cs@restoration.com</span>
                </li>
                <li style="display: flex; align-items: flex-start; gap: 0.5rem;">
                    <span>•</span>
                    <span>Client: client1@gmail.com</span>
                </li>
            </ul>
            <p style="color: white; font-size: 0.9375rem; margin-top: 0.75rem;">Password: demo123</p>
        </div>
    </div>
</div>
{% endblock %}
