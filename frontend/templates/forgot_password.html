{% extends "base.html" %}

{% block content %}
<div class="login-bg">
    <!-- Logo Header -->
    <div style="text-align: center; margin-bottom: 3rem;">
        <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Karma Staff Logo"
            style="height: 120px; width: auto; background: white; padding: 2.5rem; border-radius: 24px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);">
    </div>

    <!-- Forgot Password Card -->
    <div class="login-card">
        <h2 style="color: white; margin-bottom: 1rem; font-size: 1.5rem; font-weight: 700;">Reset Password</h2>
        <p style="color: rgba(255,255,255,0.7); font-size: 0.9375rem; margin-bottom: 2rem; line-height: 1.6;">
            Enter your email or username and we'll send you a temporary password to regain access to your account.
        </p>

        <form method="POST">
            <div style="margin-bottom: 2rem;">
                <label
                    style="display: block; color: white; font-weight: 600; margin-bottom: 0.75rem; font-size: 0.9375rem;">
                    Email or Username
                </label>
                <input type="text" name="login" required class="login-input" placeholder="Enter your details">
            </div>

            <button type="submit" class="login-btn" style="margin-bottom: 1.5rem;">
                Send Reset Password
            </button>

            <div style="text-align: center;">
                <a href="{{ url_for('login') }}"
                    style="color: rgba(255,255,255,0.7); font-size: 0.875rem; text-decoration: none; font-weight: 500; transition: color 0.2s;"
                    onmouseover="this.style.color='#ffffff'" onmouseout="this.style.color='rgba(255,255,255,0.7)'">
                    <i data-lucide="arrow-left" style="width: 14px; vertical-align: middle; margin-right: 4px;"></i>
                    Back to Sign In
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
